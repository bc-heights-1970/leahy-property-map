<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8' />
    <title>How BC Doubled Its Property Under Leahy's Presidency</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <link rel="icon" type="image/x-icon"
        href="https://bcheights.com/favicon.ico">
    <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.js'></script>
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.css' rel='stylesheet' />
    <script src="https://cdn.jsdelivr.net/npm/mapbox-gl-globe-minimap@1.2.0/dist/bundle.js"></script>
    <script src="https://unpkg.com/scrollama"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: serif;
        }

        a,
        a:hover,
        a:visited {
            color: #0071bc;
        }

        #map {
            top: 0;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        #header {
            position: relative;
            z-index: 5;
            width: 480px;
            max-width: calc(100vw - 60px);
            margin: 180px 0 0 40px;
            padding: 30px 35px;
            border-radius: 8px;
        }

        #header h1,
        #header h2,
        #header p {
            margin: 0;
            padding: 0;
            text-align: left;
        }

        #header h1 {
            font-size: 36px;
            font-weight: 800;
            line-height: 1.1;
            margin: 12px 0 10px 0;
        }

        #header h2 {
            font-size: 20px;
            font-style: italic;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        #header p {
            font-size: 16px;
            line-height: 1.8;
        }

        #footer {
            width: 100%;
            min-height: 5vh;
            padding-top: 2vh;
            padding-bottom: 2vh;
            text-align: center;
            line-height: 25px;
            font-size: 13px;
            position: relative;
            z-index: 5;
        }

        #features {
            padding-top: 35vh;
            padding-bottom: 10vh;
        }

        .hidden {
            visibility: hidden;
        }

        .centered {
            width: 50vw;
            margin: 0 auto;
        }

        .lefty {
            width: 33vw;
            margin-left: 3vw;
        }

        .righty {
            width: 33vw;
            margin-left: 62vw;
        }

        .fully {
            width: 100%;
            margin: auto;
        }

        .light {
            color: #444;
            background-color: #fafafa;
        }

        .dark {
            color: #1a1008;
            background-color: #f5f2ee;
        }

        .step {
            padding-bottom: 50vh;
            opacity: 0.25;
        }

        .step.active {
            opacity: 0.9;
        }

        .step div {
            padding: 30px 35px;
            line-height: 25px;
            font-size: 18px;
            border-radius: 12px;
            width: 480px;
            max-width: calc(100vw - 60px);
        }

        .step img {
            width: 100%;
        }

        /* Popup styling */
        .mapboxgl-popup {
            max-width: 280px;
            font: 13px/1.5 'Helvetica Neue', Arial, Helvetica, sans-serif;
        }
        .popup-content { padding: 4px 2px; }
        .popup-address { font-size: 14px; font-weight: bold; margin-bottom: 6px; color: #1a1008; }
        .popup-row { display: flex; justify-content: space-between; gap: 16px; margin-top: 3px; }
        .popup-label { color: #888; text-transform: uppercase; font-size: 10px; letter-spacing: 0.05em; }
        .popup-value { font-weight: 500; color: #1a1008; }

        @media (max-width: 750px) {
            .centered,
            .lefty,
            .righty,
            .fully {
                width: 90vw;
                margin: 0 auto;
            }
            #header {
                margin: 100px auto 0 auto;
                width: 90vw;
            }

            .step div {
                width: 90vw;
            }
        }

        .mapboxgl-canvas-container.mapboxgl-touch-zoom-rotate.mapboxgl-touch-drag-pan,
        .mapboxgl-canvas-container.mapboxgl-touch-zoom-rotate.mapboxgl-touch-drag-pan .mapboxgl-canvas {
            touch-action: unset;
        }
    </style>
</head>

<body>

    <div id="map"></div>
    <div id="story"></div>

    <script src="./config.js"></script>
    <script>
        var initLoad = true;
        var layerTypes = {
            'fill': ['fill-opacity'],
            'line': ['line-opacity'],
            'circle': ['circle-opacity', 'circle-stroke-opacity'],
            'symbol': ['icon-opacity', 'text-opacity'],
            'raster': ['raster-opacity'],
            'fill-extrusion': ['fill-extrusion-opacity'],
            'heatmap': ['heatmap-opacity']
        }

        var alignments = {
            'left': 'lefty',
            'center': 'centered',
            'right': 'righty',
            'full': 'fully'
        }

        function getLayerPaintType(layer) {
            var layerType = map.getLayer(layer).type;
            return layerTypes[layerType];
        }

        function setLayerOpacity(layer) {
            var paintProps = getLayerPaintType(layer.layer);
            paintProps.forEach(function (prop) {
                var options = {};
                if (layer.duration) {
                    var transitionProp = prop + "-transition";
                    options = { "duration": layer.duration };
                    map.setPaintProperty(layer.layer, transitionProp, options);
                }
                map.setPaintProperty(layer.layer, prop, layer.opacity, options);
            });
        }

        var story = document.getElementById('story');
        var features = document.createElement('div');
        features.setAttribute('id', 'features');

        var header = document.createElement('div');

        header.classList.add(config.theme);
        header.setAttribute('id', 'header');
        header.innerHTML = `
            <a href="https://bcheights.com" target="_blank">
                <img src="./assets/the_heights_header-2.png" style="width: 300px; display: block; margin: 0 auto 12px auto;">
            </a>
            <h1>How Boston College Expanded Under Father Leahy's Presidency</h1>
            <h2>In his 30-year tenure, BC expanded across new cities and over-doubled its land.</h2>
            <p>
                Reporting by <a href="https://bcheights.com/staff_name/geo-elasmar/" target="_blank" style="color: #8B0000; text-decoration: underline;">Geo Elasmar</a> and <a href="https://bcheights.com/staff_name/anna-lauinger/" target="_blank" style="color: #8B0000; text-decoration: underline;">Anna Lauinger</a>
                <br>
                Web design by <a href="https://bcheights.com/staff_name/geo-elasmar/" target="_blank" style="color: #8B0000; text-decoration: underline;">Geo Elasmar</a>
            </p>
                <p style="font-size: 13px; color: #888; margin-top: 8px;">April 29, 2026</p>
        `;
        story.appendChild(header);

        config.chapters.forEach((record, idx) => {
            var container = document.createElement('div');
            var chapter = document.createElement('div');

            if (record.title) {
                var title = document.createElement('h3');
                title.innerText = record.title;
                chapter.appendChild(title);
            }

            if (record.image) {
                var image = new Image();
                image.src = record.image;
                chapter.appendChild(image);
            }

            if (record.description) {
                var story = document.createElement('p');
                story.innerHTML = record.description;
                chapter.appendChild(story);
            }

            container.setAttribute('id', record.id);
            container.classList.add('step');
            if (idx === 0) {
                container.classList.add('active');
            }

            chapter.classList.add(config.theme);
            container.appendChild(chapter);
            container.classList.add(alignments[record.alignment] || 'centered');
            if (record.hidden) {
                container.classList.add('hidden');
            }
            features.appendChild(container);
        });

        story.appendChild(features);

        var footer = document.createElement('div');

        if (config.footer) {
            var footerText = document.createElement('p');
            footerText.innerHTML = config.footer;
            footer.appendChild(footerText);
        }

        if (footer.innerText.length > 0) {
            footer.classList.add(config.theme);
            footer.setAttribute('id', 'footer');
            story.appendChild(footer);
        }

        mapboxgl.accessToken = config.accessToken;

        var map = new mapboxgl.Map({
            container: 'map',
            style: config.style,
            center: config.startingCenter || config.chapters[0].location.center,
            zoom: config.startingZoom || config.chapters[0].location.zoom,
            bearing: config.startingBearing || config.chapters[0].location.bearing,
            pitch: config.startingPitch || config.chapters[0].location.pitch,
            interactive: false,
            projection: config.projection
        });

        if (config.inset) {
            map.addControl(
                new GlobeMinimap({ ...config.insetOptions }),
                config.insetPosition
            );
        }

        if (config.showMarkers) {
            var marker = new mapboxgl.Marker({ color: config.markerColor });
            marker.setLngLat(config.chapters[0].location.center).addTo(map);
        }

        var scroller = scrollama();

        map.on("load", function () {
            if (config.use3dTerrain) {
                map.addSource('mapbox-dem', {
                    'type': 'raster-dem',
                    'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
                    'tileSize': 512,
                    'maxzoom': 14
                });
                map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.5 });
                map.addLayer({
                    'id': 'sky',
                    'type': 'sky',
                    'paint': {
                        'sky-type': 'atmosphere',
                        'sky-atmosphere-sun': [0.0, 0.0],
                        'sky-atmosphere-sun-intensity': 15
                    }
                });
            };

            // ✅ CLICK AND HOVER INTERACTIONS
            const interactiveLayers = [
                'cohasset-acquisitions',
                'brighton-acquisitions',
                'newton-acquisitions',
                'brookline-acquisitions',
                'dover-acquisitions',
                'dublin-acquisitions'
            ];

            interactiveLayers.forEach(layerId => {
                map.on('click', layerId, (e) => {
                    const props = e.features[0].properties;
                    const html = `
                        <div class="popup-content">
                            <div class="popup-address">${props.address || 'Unknown address'}</div>
                            <div class="popup-row">
                                <div>
                                    <div class="popup-label">Year acquired</div>
                                    <div class="popup-value">${props.year || 'N/A'}</div>
                                </div>
                                <div>
                                    <div class="popup-label">Sale price</div>
                                    <div class="popup-value">${props.price || 'N/A'}</div>
                                </div>
                            </div>
                        </div>
                    `;
                    new mapboxgl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML(html)
                        .addTo(map);
                });

                map.on('mouseenter', layerId, () => {
                    map.getCanvas().style.cursor = 'pointer';
                });

                map.on('mouseleave', layerId, () => {
                    map.getCanvas().style.cursor = '';
                });
            });

            scroller
                .setup({
                    step: '.step',
                    offset: 0.5,
                    progress: true
                })
                .onStepEnter(async response => {
                    var current_chapter = config.chapters.findIndex(chap => chap.id === response.element.id);
                    var chapter = config.chapters[current_chapter];

                    response.element.classList.add('active');
                    map[chapter.mapAnimation || 'flyTo'](chapter.location);

                    if (config.showMarkers) {
                        marker.setLngLat(chapter.location.center);
                    }
                    if (chapter.onChapterEnter.length > 0) {
                        chapter.onChapterEnter.forEach(setLayerOpacity);
                    }
                    if (chapter.callback) {
                        window[chapter.callback]();
                    }
                    if (chapter.rotateAnimation) {
                        map.once('moveend', () => {
                            const rotateNumber = map.getBearing();
                            map.rotateTo(rotateNumber + 180, {
                                duration: 30000, easing: function (t) {
                                    return t;
                                }
                            });
                        });
                    }
                    if (config.auto) {
                        var next_chapter = (current_chapter + 1) % config.chapters.length;
                        map.once('moveend', () => {
                            document.querySelectorAll('[data-scrollama-index="' + next_chapter.toString() + '"]')[0].scrollIntoView();
                        });
                    }
                    if (response.element.id === 'explore') {
                        map.dragPan.enable();
                        map.scrollZoom.disable();
                        map.doubleClickZoom.enable();
                        map.touchZoomRotate.enable();
                    }

                    if (config.showMarkers) {
                        marker.setLngLat(chapter.location.center);
                    }
                    if (chapter.onChapterEnter.length > 0) {
                        chapter.onChapterEnter.forEach(setLayerOpacity);
                    }
                    if (chapter.callback) {
                        window[chapter.callback]();
                    }
                })
                .onStepExit(response => {
                    var chapter = config.chapters.find(chap => chap.id === response.element.id);
                    response.element.classList.remove('active');
                    if (chapter.onChapterExit.length > 0) {
                        chapter.onChapterExit.forEach(setLayerOpacity);
                    }
                    if (response.element.id === 'explore') {
                        map.dragPan.disable();
                        map.doubleClickZoom.disable();
                        map.touchZoomRotate.disable();
                    }
                    if (chapter.onChapterExit.length > 0) {
                        chapter.onChapterExit.forEach(setLayerOpacity);
                    }
                });

            if (config.auto) {
                document.querySelectorAll('[data-scrollama-index="0"]')[0].scrollIntoView();
            }
        });

    </script>

</body>

</html>
